<!doctype html>
<html lang="sq">
<head>
  <meta charset="utf-8" />
  <title>YOLO Live Viewer</title>
  <style>
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      background: #0a0a0a; 
      color: #eee; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    h1 { color: #00ff00; text-shadow: 0 0 10px rgba(0,255,0,0.3); }
    img { 
      max-width: 90%; 
      height: auto; 
      border: 2px solid #333; 
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      background: #1a1a1a;
    }
    .controls { 
      margin-top: 20px; 
      padding: 15px;
      background: #1a1a1a;
      border-radius: 8px;
    }
    input { 
      padding: 8px; 
      border-radius: 4px; 
      border: 1px solid #444; 
      background: #222; 
      color: white; 
    }
    button { 
      padding: 8px 20px; 
      background: #00ff00; 
      color: black; 
      border: none; 
      border-radius: 4px; 
      cursor: pointer; 
      font-weight: bold; 
    }
    button:hover { background: #00cc00; }
    .status { margin-top: 12px; color: #00ff00; font-family: monospace; }
    .error { color: #ff4444; }
  </style>
</head>
<body>
  <h1>YOLO Real-Time Detection</h1>
  
  <div id="container">
    <img id="stream" alt="Lidhja me serverin..." />
  </div>

  <div class="controls">
    <label>URL: <input id="streamUrl" value="/stream" /></label>
    <button id="start">Rinis Stream</button>
  </div>
  <div class="status" id="status">Duke u lidhur...</div>

  <script>
    const startBtn = document.getElementById('start');
    const img = document.getElementById('stream');
    const statusText = document.getElementById('status');
    const urlInput = document.getElementById('streamUrl');

    function startStream() {
      // Shtojmë një timestamp për të detyruar browser-in të mos përdorë cache-in
      const timestamp = new Date().getTime();
      const baseUrl = urlInput.value;
      const finalUrl = baseUrl.includes('?') ? `${baseUrl}&t=${timestamp}` : `${baseUrl}?t=${timestamp}`;
      
      statusText.textContent = 'Duke u lidhur me serverin...';
      statusText.className = 'status';
      img.src = finalUrl;
    }

    img.onload = () => {
      statusText.textContent = 'LIVE: Konfiguruar me sukses.';
      statusText.className = 'status';
    };

    img.onerror = () => {
      statusText.textContent = 'GABIM: Serveri nuk po përgjigjet. Sigurohu që porta 8000 është PUBLIC.';
      statusText.className = 'status error';
    };

    startBtn.onclick = startStream;

    // Nis automatikisht pas 1 sekonde (i jep kohë serverit të stabilizohet)
    window.onload = () => {
      setTimeout(startStream, 1000);
    };
  </script>
</body>
</html>
