<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>YOLO Live Viewer</title>
  <style>
    body { font-family: Arial, sans-serif; background:#111; color:#eee; display:flex; flex-direction:column; align-items:center; }
    img { max-width: 100%; height: auto; border: 4px solid #222; margin-top: 12px; }
    .controls { margin-top: 12px; }
    .status { margin-top: 8px; color: #aaa; }
  </style>
</head>
<body>
  <h1>YOLO Live Viewer</h1>
  <div class="controls">
    <label>Stream URL: <input id="streamUrl" value="/stream" style="width:300px"/></label>
    <button id="start">Start</button>
  </div>
  <div class="status" id="status">Stream is not started.</div>
  <div id="container">
    <img id="stream" alt="stream will appear here" />
  </div>
  <script>
    const startBtn = document.getElementById('start');
    const img = document.getElementById('stream');
    const status = document.getElementById('status');

    function startStream() {
      const url = document.getElementById('streamUrl').value;
      img.src = url;
      status.textContent = 'Streaming from ' + url;
    }

    img.onload = () => {
      status.textContent = 'Stream connected.';
    };

    img.onerror = () => {
      status.textContent = 'Stream failed to load. Check server and stream URL.';
    };

    startBtn.onclick = startStream;
    window.onload = startStream;
  </script>
</body>
</html>
