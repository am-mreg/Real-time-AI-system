<!doctype html>
<html lang="sq">
<head>
  <meta charset="utf-8" />
  <title>YOLO Live Viewer</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root{--bg:#0a0a0a;--panel:#1a1a1a;--accent:#00ff00;--muted:#444}
    html,body{height:100%;margin:0}
    body{
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:var(--bg);
      color:#eee;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      box-sizing:border-box;
    }
    .app {
      width:100%;
      max-width:900px;
      text-align:center;
    }
    h1{color:var(--accent);margin:8px 0;text-shadow:0 0 10px rgba(0,255,0,0.2)}
    .viewer {
      background:var(--panel);
      padding:12px;
      border-radius:10px;
      box-shadow:0 10px 30px rgba(0,0,0,0.6);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:12px;
    }
    .media {
      width:100%;
      max-width:820px;
      height:auto;
      border-radius:6px;
      overflow:hidden;
      background:#000;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    img#stream, video#localVideo {
      width:100%;
      height:auto;
      display:block;
      background:#000;
    }
    .controls {
      display:flex;
      gap:8px;
      align-items:center;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:6px;
    }
    input[type="text"]{
      padding:8px 10px;
      border-radius:6px;
      border:1px solid var(--muted);
      background:#111;
      color:#fff;
      min-width:220px;
    }
    button{
      padding:8px 14px;
      border-radius:6px;
      border:none;
      background:var(--accent);
      color:#000;
      font-weight:700;
      cursor:pointer;
    }
    button.secondary{
      background:#333;color:#fff;border:1px solid var(--muted)
    }
    .status{margin-top:8px;font-family:monospace;color:var(--accent)}
    .status.error{color:#ff6666}
    .note{font-size:13px;color:#bbb;margin-top:6px}
  </style>
</head>
<body>
  <div class="app">
    <h1>YOLO Real-Time Detection</h1>

    <div class="viewer" role="region" aria-label="Live viewer">
      <div class="media" id="mediaContainer">
        <!-- Server stream (multipart JPEG) -->
        <img id="stream" alt="Lidhja me serverin..." crossorigin="anonymous" />

        <!-- Local camera preview (hidden by default) -->
        <video id="localVideo" autoplay playsinline muted style="display:none"></video>
      </div>

      <div class="controls">
        <label>
          URL:
          <input id="streamUrl" type="text" value="/stream" />
        </label>

        <button id="startServer">Përdor Server Stream</button>
        <button id="startCamera" class="secondary">Përdor Kamerën Lokale</button>
        <button id="stopCamera" class="secondary" style="display:none">Ndalo Kamerën</button>
      </div>

      <div class="status" id="status">Gati.</div>
      <div class="note" id="note">Nëse përdor kamerën lokale, shfletuesi do të kërkojë leje. Shërbimi i serverit duhet të jetë i aksesueshëm nga shfletuesi (localhost ose HTTPS).</div>
    </div>
  </div>

  <script>
    const img = document.getElementById('stream');
    const localVideo = document.getElementById('localVideo');
    const status = document.getElementById('status');
    const urlInput = document.getElementById('streamUrl');
    const startServerBtn = document.getElementById('startServer');
    const startCameraBtn = document.getElementById('startCamera');
    const stopCameraBtn = document.getElementById('stopCamera');

    let localStream = null;

    function setStatus(text, isError = false) {
      status.textContent = text;
      status.className = isError ? 'status error' : 'status';
    }

    function startServerStream() {
      // Stop local camera if running
      stopLocalCamera();

      const baseUrl = urlInput.value.trim() || '/stream';
      const timestamp = Date.now();
      const finalUrl = baseUrl.includes('?') ? `${baseUrl}&t=${timestamp}` : `${baseUrl}?t=${timestamp}`;

      // Use <img> for multipart/x-mixed-replace streams (MJPEG)
      img.style.display = '';
      localVideo.style.display = 'none';
      img.src = finalUrl;
      setStatus('Duke u lidhur me serverin...');
    }

    img.onload = () => {
      setStatus('LIVE: Konfiguruar me sukses.');
    };

    img.onerror = () => {
      setStatus('GABIM: Serveri nuk po përgjigjet ose stream-i nuk është MJPEG. Kontrollo URL dhe CORS.', true);
    };

    async function startLocalCamera() {
      // Stop server stream image to avoid mixed requests
      img.src = '';
      img.style.display = 'none';

      // Request camera permission and start preview
      try {
        const constraints = { video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "environment" }, audio: false };
        localStream = await navigator.mediaDevices.getUserMedia(constraints);
        localVideo.srcObject = localStream;
        localVideo.style.display = '';
        setStatus('Kamera lokale aktive.');
        startCameraBtn.style.display = 'none';
        stopCameraBtn.style.display = '';
      } catch (err) {
        console.error('getUserMedia error:', err);
        setStatus('Nuk u mund të hap kamera: ' + (err && err.message ? err.message : err), true);
        // Restore server image element visibility so user can try server stream
        img.style.display = '';
      }
    }

    function stopLocalCamera() {
      if (localStream) {
        const tracks = localStream.getTracks();
        tracks.forEach(t => t.stop());
        localStream = null;
      }
      localVideo.srcObject = null;
      localVideo.style.display = 'none';
      startCameraBtn.style.display = '';
      stopCameraBtn.style.display = 'none';
      setStatus('Kamera lokale e ndaluar.');
    }

    stopCameraBtn.addEventListener('click', stopLocalCamera);
    startCameraBtn.addEventListener('click', startLocalCamera);
    startServerBtn.addEventListener('click', startServerStream);

    // Auto-start server stream on load (gives server 1s to start)
    window.addEventListener('load', () => {
      setTimeout(startServerStream, 1000);
    });

    // Helpful hint if browser blocks getUserMedia due to insecure context
    (function checkSecureContext() {
      if (!window.isSecureContext && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
        const note = document.getElementById('note');
        note.textContent = 'Vërejtje: getUserMedia kërkon kontekst të sigurt (HTTPS) ose localhost. Në Codespaces web preview kamera mund të mos jetë e disponueshme.';
      }
    })();
  </script>
</body>
</html>
